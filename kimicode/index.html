<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>反馈话术生成器 - 进度管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }
        .main-wrapper {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 28px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .content-grid {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 25px;
        }
        @media (max-width: 1100px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .card-title {
            font-size: 17px;
            font-weight: 600;
            color: #333;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        .question {
            margin-bottom: 18px;
        }
        .question-title {
            font-size: 14px;
            font-weight: 600;
            color: #444;
            margin-bottom: 8px;
        }
        .options {
            display: flex;
            gap: 15px;
        }
        .option {
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 6px;
            transition: background-color 0.2s;
        }
        .option:hover {
            background-color: #f0f0f0;
        }
        .option input[type="radio"] {
            width: 16px;
            height: 16px;
            margin-right: 6px;
            cursor: pointer;
        }
        .option span {
            font-size: 13px;
            color: #555;
        }
        .input-group {
            margin-top: 15px;
            display: none;
        }
        .input-group.show {
            display: block;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #e74c3c;
            margin-bottom: 5px;
        }
        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 13px;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        .input-group textarea {
            resize: vertical;
            min-height: 55px;
        }
        .input-group input:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .hint {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }
        .btn {
            width: 100%;
            padding: 11px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #6c757d;
            margin-top: 10px;
        }
        .btn-secondary:hover {
            box-shadow: 0 8px 20px rgba(108, 117, 125, 0.4);
        }
        .result {
            margin-top: 18px;
            padding: 14px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result-title {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }
        .result-content {
            font-size: 14px;
            color: #333;
            line-height: 1.6;
            word-break: break-all;
        }

        /* 下一步要做 */
        .next-step-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #ddd;
        }
        .section-subtitle {
            font-size: 13px;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .quick-options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }
        .quick-option-btn {
            padding: 6px 12px;
            background: #f0f4ff;
            border: 1px solid #667eea;
            color: #667eea;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-option-btn:hover {
            background: #667eea;
            color: white;
        }
        .quick-option-btn.active {
            background: #667eea;
            color: white;
        }

        /* 进度记录表样式 */
        .stats-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .stat-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 16px;
            border-radius: 10px;
            min-width: 85px;
            text-align: center;
        }
        .stat-value {
            font-size: 22px;
            font-weight: bold;
        }
        .stat-label {
            font-size: 11px;
            opacity: 0.9;
            margin-top: 2px;
        }
        .table-container {
            overflow-x: auto;
            max-height: 600px;
            overflow-y: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        th {
            background: #f8f9fa;
            padding: 10px 8px;
            text-align: left;
            font-weight: 600;
            color: #555;
            border-bottom: 2px solid #e0e0e0;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        td {
            padding: 10px 8px;
            border-bottom: 1px solid #f0f0f0;
            vertical-align: top;
        }
        tr:hover {
            background: #f8f9fa;
        }
        .network-name-cell {
            font-weight: 600;
            color: #333;
            max-width: 100px;
            word-break: break-all;
        }
        .days-tag {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .days-normal {
            background: #d4edda;
            color: #155724;
        }
        .days-warning {
            background: #fff3cd;
            color: #856404;
        }
        .days-danger {
            background: #f8d7da;
            color: #721c24;
        }
        .checkbox-wrapper {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            font-size: 11px;
            white-space: nowrap;
        }
        .checkbox-item input[type="checkbox"] {
            cursor: pointer;
            width: 14px;
            height: 14px;
        }
        .checkbox-item.checked {
            color: #28a745;
        }
        .progress-bar {
            width: 70px;
            height: 6px;
            background: #e9ecef;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 6px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #28a745, #20c997);
            border-radius: 3px;
            transition: width 0.3s;
        }
        .progress-text {
            font-size: 10px;
            color: #666;
            margin-top: 3px;
        }
        .next-step-cell {
            max-width: 140px;
        }
        .next-step-display {
            font-size: 11px;
            color: #667eea;
            background: #f0f4ff;
            padding: 6px 8px;
            border-radius: 6px;
            border-left: 3px solid #667eea;
            margin-top: 6px;
            line-height: 1.4;
        }
        .next-step-display.empty {
            color: #999;
            background: #f8f9fa;
            border-left-color: #ccc;
        }
        .action-btns {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .btn-small {
            padding: 4px 8px;
            font-size: 11px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: opacity 0.2s;
            white-space: nowrap;
        }
        .btn-small:hover {
            opacity: 0.8;
        }
        .btn-copy {
            background: #667eea;
            color: white;
        }
        .btn-edit {
            background: #17a2b8;
            color: white;
        }
        .btn-delete {
            background: #dc3545;
            color: white;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .custom-requirement-section {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed #ddd;
        }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-pending {
            background: #fff3cd;
            color: #856404;
        }
        .badge-processing {
            background: #cce5ff;
            color: #004085;
        }
        .badge-completed {
            background: #d4edda;
            color: #155724;
        }

        /* 编辑弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
        }
        .modal-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        .modal-input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 15px;
            font-family: inherit;
        }
        .modal-btns {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .modal-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        .modal-btn-cancel {
            background: #e0e0e0;
            color: #555;
        }
        .modal-btn-save {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <h1>📋 反馈话术生成器 - 进度管理</h1>
        
        <div class="content-grid">
            <!-- 左侧：话术生成器 -->
            <div class="left-panel">
                <div class="card">
                    <div class="card-title">📝 生成反馈话术</div>
                    
                    <div class="question">
                        <div class="question-title">1、是否有附件？</div>
                        <div class="options">
                            <label class="option">
                                <input type="radio" name="q1" value="yes" id="q1-yes">
                                <span>是</span>
                            </label>
                            <label class="option">
                                <input type="radio" name="q1" value="no" id="q1-no">
                                <span>否</span>
                            </label>
                        </div>
                    </div>

                    <div class="question">
                        <div class="question-title">2、上联光路是否拆除？</div>
                        <div class="options">
                            <label class="option">
                                <input type="radio" name="q2" value="yes" id="q2-yes">
                                <span>是</span>
                            </label>
                            <label class="option">
                                <input type="radio" name="q2" value="no" id="q2-no">
                                <span>否</span>
                            </label>
                        </div>
                    </div>

                    <div class="input-group" id="network-name-group">
                        <label for="network-name">⛔ 网管名称 *</label>
                        <input type="text" id="network-name" placeholder="请输入网管名称">
                    </div>

                    <!-- 个性化要求填写 -->
                    <div class="input-group" id="custom-requirement-group">
                        <div class="custom-requirement-section">
                            <div class="section-subtitle">📌 个性化要求（可选）</div>
                            <div id="attachment-requirement" style="display:none; margin-bottom:10px;">
                                <label for="attachment-detail" style="font-size:12px; color:#555; margin-bottom:4px; display:block;">附件要求</label>
                                <textarea id="attachment-detail" placeholder="填写附件的具体要求"></textarea>
                            </div>
                            <div id="removal-requirement" style="display:none;">
                                <label for="removal-detail" style="font-size:12px; color:#555; margin-bottom:4px; display:block;">拆除要求</label>
                                <textarea id="removal-detail" placeholder="填写光路拆除的具体要求"></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- 下一步要做 -->
                    <div class="input-group" id="next-step-group">
                        <div class="next-step-section">
                            <div class="section-subtitle">🎯 下一步要做</div>
                            <div class="quick-options">
                                <button class="quick-option-btn" onclick="setNextStep('网监评估过单')">网监评估过单</button>
                                <button class="quick-option-btn" onclick="setNextStep('等待客户回复')">等待客户回复</button>
                                <button class="quick-option-btn" onclick="setNextStep('联系施工方确认')">联系施工方确认</button>
                                <button class="quick-option-btn" onclick="focusCustomNextStep()">✏️ 自定义</button>
                            </div>
                            <textarea id="next-step-input" placeholder="点击上方选项或在此处输入下一步要做的事"></textarea>
                        </div>
                    </div>

                    <button class="btn" onclick="generateResult()">生成反馈话术</button>
                    <button class="btn btn-secondary" onclick="addToRecord()">添加到进度表</button>

                    <div class="result" id="result">
                        <div class="result-title">反馈话术：</div>
                        <div class="result-content" id="result-content"></div>
                    </div>
                </div>
            </div>

            <!-- 右侧：进度记录表 -->
            <div class="right-panel">
                <div class="card">
                    <div class="card-title">📊 进度记录表</div>
                    
                    <div class="stats-bar">
                        <div class="stat-item">
                            <div class="stat-value" id="stat-total">0</div>
                            <div class="stat-label">总任务</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="stat-pending">0</div>
                            <div class="stat-label">待处理</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="stat-processing">0</div>
                            <div class="stat-label">处理中</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="stat-completed">0</div>
                            <div class="stat-label">已完成</div>
                        </div>
                    </div>

                    <div class="table-container">
                        <table id="record-table">
                            <thead>
                                <tr>
                                    <th>网管名称</th>
                                    <th>创建时间</th>
                                    <th>已超期</th>
                                    <th>处理进度</th>
                                    <th>下一步</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="record-tbody">
                            </tbody>
                        </table>
                        <div class="empty-state" id="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <div>暂无记录，请先生成话术并添加到进度表</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑弹窗 -->
    <div class="modal-overlay" id="edit-modal">
        <div class="modal-content">
            <div class="modal-title">编辑下一步</div>
            <textarea class="modal-input" id="modal-next-step" rows="3" placeholder="输入下一步要做的事"></textarea>
            <div class="quick-options" style="margin-bottom:15px;">
                <button class="quick-option-btn" onclick="setModalNextStep('网监评估过单')">网监评估过单</button>
                <button class="quick-option-btn" onclick="setModalNextStep('等待客户回复')">等待客户回复</button>
                <button class="quick-option-btn" onclick="setModalNextStep('联系施工方确认')">联系施工方确认</button>
            </div>
            <div class="modal-btns">
                <button class="modal-btn modal-btn-cancel" onclick="closeModal()">取消</button>
                <button class="modal-btn modal-btn-save" onclick="saveModal()">保存</button>
            </div>
        </div>
    </div>

    <script>
        let records = JSON.parse(localStorage.getItem('networkRecords') || '[]');
        let editingId = null;

        document.querySelectorAll('input[type="radio"]').forEach(radio => {
            radio.addEventListener('change', checkNeedInput);
        });

        function checkNeedInput() {
            const q1No = document.getElementById('q1-no').checked;
            const q2No = document.getElementById('q2-no').checked;
            
            const networkGroup = document.getElementById('network-name-group');
            const customGroup = document.getElementById('custom-requirement-group');
            const nextStepGroup = document.getElementById('next-step-group');
            const attachmentReq = document.getElementById('attachment-requirement');
            const removalReq = document.getElementById('removal-requirement');

            if (q1No || q2No) {
                networkGroup.classList.add('show');
                customGroup.classList.add('show');
                nextStepGroup.classList.add('show');
                
                if (q1No) {
                    attachmentReq.style.display = 'block';
                } else {
                    attachmentReq.style.display = 'none';
                    document.getElementById('attachment-detail').value = '';
                }
                
                if (q2No) {
                    removalReq.style.display = 'block';
                } else {
                    removalReq.style.display = 'none';
                    document.getElementById('removal-detail').value = '';
                }
            } else {
                networkGroup.classList.remove('show');
                customGroup.classList.remove('show');
                nextStepGroup.classList.remove('show');
                document.getElementById('network-name').value = '';
                document.getElementById('attachment-detail').value = '';
                document.getElementById('removal-detail').value = '';
                document.getElementById('next-step-input').value = '';
                document.querySelectorAll('.quick-option-btn').forEach(btn => btn.classList.remove('active'));
            }
        }

        function setNextStep(text) {
            document.getElementById('next-step-input').value = text;
            document.querySelectorAll('#next-step-group .quick-option-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === text) {
                    btn.classList.add('active');
                }
            });
        }

        function focusCustomNextStep() {
            document.getElementById('next-step-input').focus();
            document.querySelectorAll('#next-step-group .quick-option-btn').forEach(btn => {
                btn.classList.remove('active');
            });
        }

        function generateResult() {
            const q1Yes = document.getElementById('q1-yes').checked;
            const q1No = document.getElementById('q1-no').checked;
            const q2Yes = document.getElementById('q2-yes').checked;
            const q2No = document.getElementById('q2-no').checked;
            const networkName = document.getElementById('network-name').value.trim();
            const attachmentDetail = document.getElementById('attachment-detail').value.trim();
            const removalDetail = document.getElementById('removal-detail').value.trim();
            
            const result = document.getElementById('result');
            const resultContent = document.getElementById('result-content');

            if (!q1Yes && !q1No) {
                alert('请选择问题1的答案');
                return null;
            }
            if (!q2Yes && !q2No) {
                alert('请选择问题2的答案');
                return null;
            }

            if ((q1No || q2No) && !networkName) {
                alert('请填写网管名称');
                return null;
            }

            let message = '';
            let requirements = [];

            if (q1No && q2No) {
                message = `"${networkName}"请提供附件、上联光路需拆除`;
                if (attachmentDetail) requirements.push(`附件要求：${attachmentDetail}`);
                if (removalDetail) requirements.push(`拆除要求：${removalDetail}`);
            } else if (q1No) {
                message = `"${networkName}"请提供附件`;
                if (attachmentDetail) requirements.push(`附件要求：${attachmentDetail}`);
            } else if (q2No) {
                message = `"${networkName}"上联光路需拆除`;
                if (removalDetail) requirements.push(`拆除要求：${removalDetail}`);
            } else {
                message = '信息完整，无需补充。';
            }

            if (requirements.length > 0) {
                message += '，' + requirements.join('，') + '。';
            } else if (!q1Yes || !q2Yes) {
                message += '。';
            }

            resultContent.textContent = message;
            result.classList.add('show');
            
            return message;
        }

        function addToRecord() {
            const message = generateResult();
            if (!message) return;
            
            const networkName = document.getElementById('network-name').value.trim();
            const q1No = document.getElementById('q1-no').checked;
            const q2No = document.getElementById('q2-no').checked;
            const nextStep = document.getElementById('next-step-input').value.trim();
            
            if (!networkName) {
                alert('该情况无需添加到进度表');
                return;
            }

            const record = {
                id: Date.now(),
                networkName: networkName,
                createdAt: new Date().toISOString(),
                needAttachment: q1No,
                needRemoval: q2No,
                message: message,
                attachmentSubmitted: false,
                removalCompleted: false,
                nextStep: nextStep || '',
                nextStepVisible: true
            };

            records.unshift(record);
            saveRecords();
            renderRecords();
            
            alert('已添加到进度表！');
        }

        function saveRecords() {
            localStorage.setItem('networkRecords', JSON.stringify(records));
        }

        function renderRecords() {
            const tbody = document.getElementById('record-tbody');
            const emptyState = document.getElementById('empty-state');
            const table = document.getElementById('record-table');

            updateStats();

            if (records.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                table.style.display = 'none';
                return;
            }

            emptyState.style.display = 'none';
            table.style.display = 'table';

            tbody.innerHTML = records.map(record => {
                const days = calculateDays(record.createdAt);
                const daysClass = days < 3 ? 'days-normal' : days < 7 ? 'days-warning' : 'days-danger';
                const progress = calculateProgress(record);
                const status = getStatus(record);
                
                let showNextStep = false;
                if (record.nextStep && record.nextStepVisible) {
                    if (progress === 0 && record.nextStep) {
                        showNextStep = true;
                    } else if ((record.needAttachment && record.attachmentSubmitted) || 
                               (record.needRemoval && record.removalCompleted)) {
                        showNextStep = true;
                    } else if (progress === 100) {
                        showNextStep = true;
                    }
                }
                
                return `
                    <tr data-id="${record.id}">
                        <td class="network-name-cell">${record.networkName}</td>
                        <td>${formatDate(record.createdAt)}</td>
                        <td><span class="days-tag ${daysClass}">${days}天</span></td>
                        <td>
                            <div class="checkbox-wrapper">
                                ${record.needAttachment ? `
                                <label class="checkbox-item ${record.attachmentSubmitted ? 'checked' : ''}">
                                    <input type="checkbox" ${record.attachmentSubmitted ? 'checked' : ''} 
                                        onchange="toggleAttachment(${record.id})" id="attach-${record.id}">
                                    <span>附件已提交</span>
                                </label>` : ''}
                                ${record.needRemoval ? `
                                <label class="checkbox-item ${record.removalCompleted ? 'checked' : ''}">
                                    <input type="checkbox" ${record.removalCompleted ? 'checked' : ''} 
                                        onchange="toggleRemoval(${record.id})" id="remove-${record.id}">
                                    <span>光路已拆除</span>
                                </label>` : ''}
                            </div>
                            <div class="progress-bar" style="margin-top:6px;">
                                <div class="progress-fill" style="width:${progress}%"></div>
                            </div>
                            <div class="progress-text">${progress}%</div>
                        </td>
                        <td class="next-step-cell">
                            ${showNextStep ? `
                                <div class="next-step-display">${record.nextStep}</div>
                            ` : '<div class="next-step-display empty">-</div>'}
                        </td>
                        <td><span class="badge badge-${status.class}">${status.text}</span></td>
                        <td>
                            <div class="action-btns">
                                <button class="btn-small btn-copy" onclick="copyMessage('${record.id}')">复制话术</button>
                                <button class="btn-small btn-edit" onclick="editNextStep(${record.id})">编辑下一步</button>
                                <button class="btn-small btn-delete" onclick="deleteRecord(${record.id})">删除</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function calculateDays(createdAt) {
            const created = new Date(createdAt);
            const now = new Date();
            const diff = now - created;
            return Math.floor(diff / (1000 * 60 * 60 * 24));
        }

        function calculateProgress(record) {
            let total = 0;
            let completed = 0;
            if (record.needAttachment) {
                total++;
                if (record.attachmentSubmitted) completed++;
            }
            if (record.needRemoval) {
                total++;
                if (record.removalCompleted) completed++;
            }
            return total === 0 ? 100 : Math.round((completed / total) * 100);
        }

        function getStatus(record) {
            const progress = calculateProgress(record);
            if (progress === 0) return { class: 'pending', text: '待处理' };
            if (progress === 100) return { class: 'completed', text: '已完成' };
            return { class: 'processing', text: '处理中' };
        }

        function formatDate(isoString) {
            const date = new Date(isoString);
            return `${date.getMonth() + 1}/${date.getDate()} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
        }

        function updateStats() {
            const total = records.length;
            const pending = records.filter(r => calculateProgress(r) === 0).length;
            const completed = records.filter(r => calculateProgress(r) === 100).length;
            const processing = total - pending - completed;

            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-pending').textContent = pending;
            document.getElementById('stat-processing').textContent = processing;
            document.getElementById('stat-completed').textContent = completed;
        }

        function toggleAttachment(id) {
            const record = records.find(r => r.id === id);
            if (record) {
                record.attachmentSubmitted = !record.attachmentSubmitted;
                if (record.attachmentSubmitted) {
                    record.nextStepVisible = true;
                }
                saveRecords();
                renderRecords();
            }
        }

        function toggleRemoval(id) {
            const record = records.find(r => r.id === id);
            if (record) {
                record.removalCompleted = !record.removalCompleted;
                if (record.removalCompleted) {
                    record.nextStepVisible = true;
                }
                saveRecords();
                renderRecords();
            }
        }

        function editNextStep(id) {
            const record = records.find(r => r.id === id);
            if (record) {
                editingId = id;
                document.getElementById('modal-next-step').value = record.nextStep || '';
                document.getElementById('edit-modal').classList.add('show');
            }
        }

        function setModalNextStep(text) {
            document.getElementById('modal-next-step').value = text;
        }

        function closeModal() {
            document.getElementById('edit-modal').classList.remove('show');
            editingId = null;
        }

        function saveModal() {
            if (editingId) {
                const record = records.find(r => r.id === editingId);
                if (record) {
                    record.nextStep = document.getElementById('modal-next-step').value.trim();
                    record.nextStepVisible = true;
                    saveRecords();
                    renderRecords();
                }
            }
            closeModal();
        }

        function copyMessage(id) {
            const record = records.find(r => r.id === parseInt(id));
            if (record) {
                navigator.clipboard.writeText(record.message).then(() => {
                    alert('话术已复制到剪贴板！');
                });
            }
        }

        function deleteRecord(id) {
            if (confirm('确定要删除这条记录吗？')) {
                records = records.filter(r => r.id !== id);
                saveRecords();
                renderRecords();
            }
        }

        document.getElementById('edit-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        renderRecords();
    </script>
</body>
</html>
